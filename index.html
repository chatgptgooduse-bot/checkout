<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>極速結帳助理-智慧懸浮置頂版</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0; padding: 20px;
            display: flex; flex-direction: column; align-items: center; justify-content: flex-start;
            min-height: 92vh; background-color: #f5f5f7; color: #333;
        }
        h1 { font-size: 1.2rem; color: #007aff; margin: 0 0 5px 0; }
        #status { color: #666; margin-bottom: 10px; font-size: 0.9rem; font-weight: bold;}
        
        #pip-btn {
            background-color: #34c759; color: white; border: none; border-radius: 10px;
            padding: 15px 20px; font-size: 1.2rem; font-weight: bold; cursor: pointer;
            box-shadow: 0 4px 10px rgba(52, 199, 89, 0.3); margin-bottom: 15px; width: 100%; max-width: 360px;
        }

        #main-ui {
            width: 100%; max-width: 360px; text-align: center;
            display: flex; flex-direction: column; align-items: center; padding: 20px 0;
            background-color: #ffffff; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }
        #prod-name { font-size: 2.5rem; font-weight: 800; color: #000; margin-bottom: 15px; }
        #spec-menu { display: flex; flex-direction: column; gap: 10px; width: 90%; margin-bottom: 15px; }
        .spec-btn { background-color: #ff9500; color: white; border: none; border-radius: 12px; padding: 14px 10px; font-size: 1.6rem; font-weight: bold; cursor: pointer; }
        .spec-btn:active { background-color: #e08400; }
        #heard-box { font-size: 1.1rem; color: #ff9500; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>

    <h1>🛒 語音結帳助手</h1>
    <div id="status">正在同步雲端品項...</div>

    <button id="pip-btn" onclick="enterPiP()">📌 點我開啟「永遠置頂」懸浮視窗</button>

    <div id="main-ui">
        <div id="prod-name">語音快查</div>
        <div id="spec-menu"></div>
        <div id="heard-box">正在聽：<span id="heard-text">-</span></div>
    </div>

    <script>
        const statusDiv = document.getElementById('status');
        const prodNameHtml = document.getElementById('prod-name');
        const specMenuHtml = document.getElementById('spec-menu');
        const heardTextHtml = document.getElementById('heard-text');

        let BARCODE_DATABASE = [];
        let sheetId = "1rV1jwD3sy5Aib1f2ZnSdSkkrcoEIvJ8DMhzcZbEyaKc"; 
        let lastScannedText = ""; 
        let lastScannedTime = 0; // 新增：記錄上次成功識別的時間戳記
        const ignoreWords = ["我要找", "幫我找", "我要查", "幫我查", "那個", "商品是", "有沒有", "一下", "幫我", "找", "查", "老闆", "這個", "多少錢"];

        // 擴充同音字字典（把小姐常被聽錯的詞加進來）
        const soundAlikeDictionary = {
            "藝人": "薏仁", "一人": "薏仁", "義人": "薏仁",
            "濾豆": "綠豆", "律豆": "綠豆", "率豆": "綠豆",
            "紅豆二字": "紅豆"
        };

        let pipWin = null;
        let watchDogTimer = null; 
        let isScanCoolingDown = false; 

        let userSavedWidth = 540;
        let userSavedHeight = 480;

        function fetchCloudData() {
            statusDiv.innerText = "正在更新本地資料庫...";
            const url = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:json&sheet=Sheet1`;
            
            fetch(url)
                .then(res => res.text())
                .then(txt => {
                    const jsonString = txt.substring(txt.indexOf("{"), txt.lastIndexOf("}") + 1);
                    const data = JSON.parse(jsonString);
                    const rows = data.table.rows;
                    
                    BARCODE_DATABASE = rows.map(row => {
                        if (!row || !row.c) return null;
                        
                        let pName = "";
                        if (row.c[0]) pName = row.c[0].f ? row.c[0].f.toString().trim() : (row.c[0].v ? row.c[0].v.toString().trim() : "");
                        
                        let pCode = "";
                        if (row.c[1]) pCode = row.c[1].f ? row.c[1].f.toString().trim() : (row.c[1].v ? row.c[1].v.toString().trim() : "");
                        
                        let rawAlias = "";
                        if (row.c[2]) rawAlias = row.c[2].f ? row.c[2].f.toString().trim() : (row.c[2].v ? row.c[2].v.toString().trim() : "");
                        
                        let aliasArray = rawAlias ? rawAlias.split(/[\s,，]+/) : [];
                        
                        return { name: pName, barcode: pCode, aliasList: aliasArray };
                    }).filter(item => item !== null && item.name !== "");
                    
                    statusDiv.innerText = `本地同步成功！共載入 ${BARCODE_DATABASE.length} 個品項`;
                    prodNameHtml.innerText = "請點擊綠色置頂按鈕";
                })
                .catch(err => {
                    statusDiv.innerText = "連線失敗，請檢查網路或發佈設定";
                });
        }

        async function enterPiP() {
            if (!('documentPictureInPicture' in window)) {
                alert("瀏覽器版本不支援懸浮功能！");
                return;
            }

            pipWin = await window.documentPictureInPicture.requestWindow({ width: userSavedWidth, height: userSavedHeight });

            pipWin.document.head.innerHTML = `
                <style>
                    body { 
                        font-family: "Microsoft JhengHei", sans-serif; 
                        margin: 0; padding: 4px; 
                        display: flex; flex-direction: column; align-items: center; 
                        background: #ffffff; height: 100vh; overflow: hidden; 
                        box-sizing: border-box; justify-content: flex-start;
                    }
                    #top-bar { display: flex; width: 98%; gap: 6px; align-items: center; margin-bottom: 4px; height: 38px; }
                    #toggle-box-btn { flex: 1; background-color: #ff3b30; color: white; border: none; border-radius: 6px; padding: 8px 0; font-size: 1.1rem; font-weight: bold; cursor: pointer; text-align: center; height: 100%; }
                    #toggle-box-btn.collapsed { background-color: #34c759; }
                    #h-box { width: 130px; font-size: 1rem; color: #ff9500; font-weight: bold; text-align: center; background: #f5f5f7; border-radius: 6px; height: 100%; display: flex; align-items: center; justify-content: center; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
                    #content-wrapper { width: 100%; flex: 1; display: flex; flex-direction: column; align-items: center; overflow: hidden; }
                    #p-name { font-size: 1.6rem; font-weight: 900; color: #007aff; text-align: center; margin: 2px 0 6px 0; padding: 0; line-height: 1.1; }
                    #s-menu { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; width: 98%; flex: 1; overflow-y: auto; margin: 0; padding: 0 2px 6px 2px; box-sizing: border-box; }
                    .s-btn { background: #ff9500; color: white; border: none; border-radius: 8px; font-size: 1.5rem; font-weight: bold; cursor: pointer; text-align: center; word-break: break-all; box-shadow: 0 3px 5px rgba(255,149,0,0.15); display: flex; align-items: center; justify-content: center; padding: 12px 4px; }
                    .s-btn:active { background: #e08400; }
                </style>
            `;

            pipWin.document.body.innerHTML = `
                <div id="top-bar">
                    <button id="toggle-box-btn">➖ 收起視窗</button>
                    <div id="h-box">聽：<span id="h-text">-</span></div>
                </div>
                <div id="content-wrapper">
                    <div id="p-name">請開始說話...</div>
                    <div id="s-menu"></div>
                </div>
            `;

            const tBtn = pipWin.document.getElementById('toggle-box-btn');
            const wrapper = pipWin.document.getElementById('content-wrapper');
            let isCollapsed = false;

            tBtn.onclick = () => {
                if (!isCollapsed) {
                    userSavedWidth = pipWin.outerWidth;
                    userSavedHeight = pipWin.outerHeight;
                    wrapper.style.display = "none";
                    tBtn.innerText = "➕ 展開語音助理";
                    tBtn.classList.add('collapsed');
                    pipWin.resizeTo(userSavedWidth, 75); 
                    isCollapsed = true;
                } else {
                    wrapper.style.display = "flex";
                    tBtn.innerText = "➖ 收起視窗";
                    tBtn.classList.remove('collapsed');
                    pipWin.resizeTo(userSavedWidth, userSavedHeight); 
                    isCollapsed = false;
                }
            };

            statusDiv.innerText = "📌 永遠置頂懸浮窗已啟動！";
            if(!isAutoListening) { startAutoListening(); }
        }

        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        const recognition = new SpeechRecognition();
        recognition.lang = 'zh-TW';
        recognition.continuous = true; 
        recognition.interimResults = true; 

        let isAutoListening = false;
        function toggleListening() { if (isAutoListening) stopAutoListening(); else startAutoListening(); }
        
        function startAutoListening() { 
            isAutoListening = true; 
            try { recognition.start(); } catch (e) {} 
            feedWatchDog(); 
        }
        
        function stopAutoListening() { 
            isAutoListening = false; 
            recognition.stop(); 
            clearTimeout(watchDogTimer);
        }
        
        recognition.onend = () => { if (isAutoListening) { try { recognition.start(); } catch (e) {} } };

        function feedWatchDog() {
            clearTimeout(watchDogTimer);
            if (!isAutoListening) return;
            watchDogTimer = setTimeout(() => {
                try { recognition.stop(); } catch(e){}
                setTimeout(() => { try { recognition.start(); } catch(e){} }, 100);
                feedWatchDog(); 
            }, 3500); 
        }

        // 修改後的關鍵語音處理邏輯
        recognition.onresult = (event) => {
            feedWatchDog(); 
            let currentResultIndex = event.resultIndex;
            let transcript = event.results[currentResultIndex][0].transcript.trim();
            
            // 1. 基本清洗
            let cleanText = transcript.replace(/[^\u4e00-\u9fa5a-zA-Z0-9]/g, "");
            ignoreWords.forEach(word => { cleanText = cleanText.replace(new RegExp(word, 'g'), ""); });

            // 2. 進行同音字替換（優先把整串字裡的錯字換掉）
            for (const key in soundAlikeDictionary) {
                if (cleanText.includes(key)) cleanText = cleanText.replace(new RegExp(key, 'g'), soundAlikeDictionary[key]);
            }

            if (!cleanText || cleanText.length < 2) return;

            // 3. 防鎖死優化：如果超過 1.5 秒沒觸發成功，就清除上次記錄，允許重複點同一件商品
            let now = Date.now();
            if (now - lastScannedTime > 1500) {
                lastScannedText = "";
            }
            if (cleanText === lastScannedText) return;

            // 更新畫面上顯示聽到的文字
            heardTextHtml.innerText = cleanText;
            if (pipWin) { pipWin.document.getElementById('h-text').innerText = cleanText; }

            // 4. 【核心改動】滑動視窗比對法
            // 我們不僅比對整串話，還去切出「最後的2個字」、「最後3個字」、「最後4個字」來與資料庫比對
            // 這樣「老闆這個多少錢紅豆」切出最後兩個字就是「紅豆」，就能完美抓到！
            let matchCandidates = [cleanText];
            if (cleanText.length > 2) matchCandidates.push(cleanText.slice(-2));
            if (cleanText.length > 3) matchCandidates.push(cleanText.slice(-3));
            if (cleanText.length > 4) matchCandidates.push(cleanText.slice(-4));

            let matchedItems = [];
            
            // 從資料庫找有沒有符合任何一個候選字詞的品項
            BARCODE_DATABASE.forEach(item => {
                let isMatch = matchCandidates.some(chunk => {
                    let matchName = chunk.includes(item.name) || item.name.includes(chunk);
                    let matchAlias = item.aliasList && item.aliasList.some(alias => alias === chunk);
                    return matchName || matchAlias;
                });
                if (isMatch) {
                    matchedItems.push(item);
                }
            });
            
            // 去除重複的品項
            matchedItems = Array.from(new Set(matchedItems));

            if (matchedItems.length === 0) return; 
            
            // 成功觸發，更新歷史與時間戳記
            lastScannedText = cleanText;
            lastScannedTime = now;

            renderSpecificationMenu(matchedItems);
        };

        function renderSpecificationMenu(matchedItems) {
            specMenuHtml.innerHTML = "";
            specMenuHtml.style.display = "none";

            let pipName = null, pipMenu = null;
            if (pipWin) {
                pipName = pipWin.document.getElementById('p-name');
                pipMenu = pipWin.document.getElementById('s-menu');
                pipMenu.innerHTML = "";
                pipMenu.style.display = "none";
            }

            if (matchedItems.length === 1) {
                sendCodeToPython(matchedItems[0]);
            } else {
                prodNameHtml.innerText = "請選擇規格";
                specMenuHtml.style.display = "flex";

                if (pipWin && pipName && pipMenu) {
                    pipName.innerText = "請選擇規格";
                    pipMenu.style.display = "grid";
                }

                matchedItems.forEach(item => {
                    const btn = document.createElement('button');
                    btn.className = 'spec-btn';
                    btn.innerText = item.name;
                    btn.onclick = () => { sendCodeToPython(item); specMenuHtml.style.display = "none"; };
                    specMenuHtml.appendChild(btn);

                    if (pipWin && pipMenu) {
                        const pipBtn = pipWin.document.createElement('button');
                        pipBtn.className = 's-btn';
                        pipBtn.innerText = item.name;
                        pipBtn.onclick = () => { sendCodeToPython(item); pipMenu.style.display = "none"; };
                        pipMenu.appendChild(pipBtn);
                    }
                });
            }
        }

        function sendCodeToPython(item) {
            if (isScanCoolingDown) return;

            prodNameHtml.innerText = item.name + " 🚀發射中";
            if (pipWin) pipWin.document.getElementById('p-name').innerText = item.name + " 🚀發射中";

            isScanCoolingDown = true;

            let finalCode = item.barcode ? item.barcode.toString().trim() : "";
            let encodedCode = encodeURIComponent(finalCode);

            fetch(`http://127.0.0.1:5000/scan?code=${encodedCode}`)
                .then(() => {
                    prodNameHtml.innerText = item.name + " 🚀已灌入";
                    if (pipWin) pipWin.document.getElementById('p-name').innerText = item.name + " 🚀已灌入";
                })
                .catch(() => {
                    prodNameHtml.innerText = item.name + " ❌失敗(未開Python)";
                    if (pipWin) pipWin.document.getElementById('p-name').innerText = item.name + " ❌失敗(未開Python)";
                })
                .finally(() => {
                    setTimeout(() => { isScanCoolingDown = false; }, 1200);
                });
        }

        fetchCloudData();
    </script>
</body>
</html>
