<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>極速結帳助理-智慧懸浮置頂版</title>
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0; padding: 20px;
            display: flex; flex-direction: column; align-items: center; justify-content: flex-start;
            min-height: 92vh; background-color: #f5f5f7; color: #333;
        }
        h1 { font-size: 1.2rem; color: #007aff; margin: 0 0 5px 0; }
        #status { color: #666; margin-bottom: 10px; font-size: 0.9rem; font-weight: bold;}
        
        #pip-btn {
            background-color: #34c759; color: white; border: none; border-radius: 10px;
            padding: 15px 20px; font-size: 1.2rem; font-weight: bold; cursor: pointer;
            box-shadow: 0 4px 10px rgba(52, 199, 89, 0.3); margin-bottom: 15px; width: 100%; max-width: 360px;
        }

        #main-ui {
            width: 100%; max-width: 360px; text-align: center;
            display: flex; flex-direction: column; align-items: center; padding: 20px 0;
            background-color: #ffffff; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }
        #prod-name { font-size: 2.5rem; font-weight: 800; color: #000; margin-bottom: 15px; }
        #spec-menu { display: flex; flex-direction: column; gap: 10px; width: 90%; margin-bottom: 15px; }
        .spec-btn { background-color: #ff9500; color: white; border: none; border-radius: 12px; padding: 14px 10px; font-size: 1.6rem; font-weight: bold; cursor: pointer; }
        .spec-btn:active { background-color: #e08400; }
        
        #barcode-container { width: 100%; min-height: 140px; }
        #barcode-canvas { max-width: 95%; height: auto; margin: 0 auto; }
        
        button#mic-btn { background-color: #007aff; color: white; border: none; border-radius: 50%; width: 80px; height: 80px; font-size: 35px; cursor: pointer; margin-top: 15px; }
        button#mic-btn.active-listening { background-color: #ff3b30; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(255, 59, 48, 0.7); } 70% { box-shadow: 0 0 0 15px rgba(255, 59, 48, 0); } 100% { box-shadow: 0 0 0 0 rgba(255, 59, 48, 0); } }
        #heard-box { font-size: 1.1rem; color: #ff9500; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>

    <h1>🛒 語音結帳助手</h1>
    <div id="status">正在同步雲端品項...</div>

    <button id="pip-btn" onclick="enterPiP()">📌 點我開啟「永遠置頂」懸浮視窗</button>

    <div id="main-ui">
        <div id="prod-name">語音快查</div>
        <div id="spec-menu"></div>
        <div id="barcode-container">
            <canvas id="barcode-canvas"></canvas>
        </div>
        <button id="mic-btn" onclick="toggleListening()">🎤</button>
        <div id="heard-box">正在聽：<span id="heard-text">-</span></div>
    </div>

    <script>
        const statusDiv = document.getElementById('status');
        const prodNameHtml = document.getElementById('prod-name');
        const specMenuHtml = document.getElementById('spec-menu');
        const barcodeCanvas = document.getElementById('barcode-canvas');
        const heardTextHtml = document.getElementById('heard-text');
        const micBtn = document.getElementById('mic-btn');

        let BARCODE_DATABASE = [];
        let sheetId = "1rV1jwD3sy5Aib1f2ZnSdSkkrcoEIvJ8DMhzcZbEyaKc"; 
        let lastScannedText = ""; 
        const ignoreWords = ["我要找", "幫我找", "我要查", "幫我查", "那個", "商品是", "有沒有", "一下", "幫我", "找", "查"];

        const soundAlikeDictionary = {
            "藝人": "薏仁", "一人": "薏仁", "義人": "薏仁"
        };

        let pipWin = null;
        let watchDogTimer = null; 
        let isScanCoolingDown = false; 

        let userSavedWidth = 540;
        let userSavedHeight = 480;

        function fetchCloudData() {
            statusDiv.innerText = "正在更新本地資料庫...";
            // 💡 調整網址：改採 Visualization API 的標準格式輸出，確保中英數混合代碼不中斷
            const url = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:json&sheet=Sheet1`;
            
            fetch(url)
                .then(res => res.text())
                .then(txt => {
                    const jsonString = txt.substring(txt.indexOf("{"), txt.lastIndexOf("}") + 1);
                    const data = JSON.parse(jsonString);
                    const rows = data.table.rows;
                    
                    BARCODE_DATABASE = rows.map(row => {
                        if (!row || !row.c) return null;
                        
                        // 💡 萬能純文字讀取：優先抓取格式化後的顯示文字 (.f)，其次抓取原始值 (.v)
                        let pName = "";
                        if (row.c[0]) {
                            pName = row.c[0].f ? row.c[0].f.toString().trim() : (row.c[0].v ? row.c[0].v.toString().trim() : "");
                        }
                        
                        let pCode = "";
                        if (row.c[1]) {
                            pCode = row.c[1].f ? row.c[1].f.toString().trim() : (row.c[1].v ? row.c[1].v.toString().trim() : "");
                        }
                        
                        let rawAlias = "";
                        if (row.c[2]) {
                            rawAlias = row.c[2].f ? row.c[2].f.toString().trim() : (row.c[2].v ? row.c[2].v.toString().trim() : "");
                        }
                        
                        let aliasArray = rawAlias ? rawAlias.split(/[\s,，]+/) : [];
                        
                        return {
                            name: pName,
                            barcode: pCode,
                            aliasList: aliasArray 
                        };
                    }).filter(item => item !== null && item.name !== ""); // 放寬過濾機制，只要有品名就抓
                    
                    statusDiv.innerText = `本地同步成功！共載入 ${BARCODE_DATABASE.length} 個品項`;
                    prodNameHtml.innerText = "請點擊綠色置頂按鈕";
                })
                .catch(err => {
                    statusDiv.innerText = "連線失敗，請檢查網路或發佈設定";
                });
        }

        async function enterPiP() {
            if (!('documentPictureInPicture' in window)) {
                alert("瀏覽器版本不支援懸浮功能！");
                return;
            }

            pipWin = await window.documentPictureInPicture.requestWindow({ width: userSavedWidth, height: userSavedHeight });

            pipWin.document.head.innerHTML = `
                <style>
                    body { 
                        font-family: "Microsoft JhengHei", sans-serif; 
                        margin: 0; padding: 4px; 
                        display: flex; flex-direction: column; align-items: center; 
                        background: #ffffff; height: 100vh; overflow: hidden; 
                        box-sizing: border-box; justify-content: flex-start;
                    }
                    #top-bar {
                        display: flex; width: 98%; gap: 6px; align-items: center; margin-bottom: 4px; height: 38px;
                    }
                    #toggle-box-btn {
                        flex: 1; background-color: #ff3b30; color: white; border: none;
                        border-radius: 6px; padding: 8px 0; font-size: 1.1rem; font-weight: bold;
                        cursor: pointer; text-align: center; height: 100%;
                    }
                    #toggle-box-btn.collapsed { background-color: #34c759; }
                    
                    #h-box { 
                        width: 130px; font-size: 1rem; color: #ff9500; font-weight: bold; 
                        text-align: center; background: #f5f5f7; border-radius: 6px;
                        height: 100%; display: flex; align-items: center; justify-content: center;
                        overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
                    }
                    #content-wrapper {
                        width: 100%; flex: 1; display: flex; flex-direction: column; align-items: center; overflow: hidden;
                    }
                    #p-name { 
                        font-size: 1.6rem; font-weight: 900; color: #007aff; 
                        text-align: center; margin: 2px 0 6px 0; padding: 0;
                        line-height: 1.1;
                    }
                    #s-menu { 
                        display: grid; grid-template-columns: 1fr 1fr; gap: 8px; 
                        width: 98%; flex: 1; overflow-y: auto; 
                        margin: 0; padding: 0 2px 6px 2px; box-sizing: border-box;
                    }
                    .s-btn { 
                        background: #ff9500; color: white; border: none; 
                        border-radius: 8px; font-size: 1.5rem; 
                        font-weight: bold; cursor: pointer; text-align: center;
                        word-break: break-all; box-shadow: 0 3px 5px rgba(255,149,0,0.15);
                        display: flex; align-items: center; justify-content: center; padding: 12px 4px;
                    }
                    .s-btn:active { background: #e08400; }
                    #bc-container { width: 100%; text-align: center; margin: 0; padding: 0; }
                    #bc-canvas { max-width: 90%; height: 65px; display: none; margin: 0 auto; }
                </style>
            `;

            pipWin.document.body.innerHTML = `
                <div id="top-bar">
                    <button id="toggle-box-btn">➖ 收起視窗</button>
                    <div id="h-box">聽：<span id="h-text">-</span></div>
                </div>
                <div id="content-wrapper">
                    <div id="p-name">請開始說話...</div>
                    <div id="s-menu"></div>
                    <div id="bc-container"><canvas id="bc-canvas"></canvas></div>
                </div>
            `;

            const tBtn = pipWin.document.getElementById('toggle-box-btn');
            const wrapper = pipWin.document.getElementById('content-wrapper');
            let isCollapsed = false;

            tBtn.onclick = () => {
                if (!isCollapsed) {
                    userSavedWidth = pipWin.outerWidth;
                    userSavedHeight = pipWin.outerHeight;

                    wrapper.style.display = "none";
                    tBtn.innerText = "➕ 展開語音助理";
                    tBtn.classList.add('collapsed');
                    pipWin.resizeTo(userSavedWidth, 75); 
                    isCollapsed = true;
                } else {
                    wrapper.style.display = "flex";
                    tBtn.innerText = "➖ 收起視窗";
                    tBtn.classList.remove('collapsed');
                    pipWin.resizeTo(userSavedWidth, userSavedHeight); 
                    isCollapsed = false;
                }
            };

            statusDiv.innerText = "📌 永遠置頂懸浮窗已啟動！";
            if(!isAutoListening) { startAutoListening(); }
        }

        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        const recognition = new SpeechRecognition();
        recognition.lang = 'zh-TW';
        recognition.continuous = true; 
        recognition.interimResults = true; 

        let isAutoListening = false;
        function toggleListening() { if (isAutoListening) stopAutoListening(); else startAutoListening(); }
        
        function startAutoListening() { 
            isAutoListening = true; 
            micBtn.classList.add("active-listening"); 
            try { recognition.start(); } catch (e) {} 
            feedWatchDog(); 
        }
        
        function stopAutoListening() { 
            isAutoListening = false; 
            micBtn.classList.remove("active-listening"); 
            recognition.stop(); 
            clearTimeout(watchDogTimer);
        }
        
        recognition.onend = () => { if (isAutoListening) { try { recognition.start(); } catch (e) {} } };

        function feedWatchDog() {
            clearTimeout(watchDogTimer);
            if (!isAutoListening) return;
            watchDogTimer = setTimeout(() => {
                try { recognition.stop(); } catch(e){}
                setTimeout(() => { try { recognition.start(); } catch(e){} }, 100);
                feedWatchDog(); 
            }, 3500); 
        }

        recognition.onresult = (event) => {
            feedWatchDog(); 
            
            let currentResultIndex = event.resultIndex;
            let transcript = event.results[currentResultIndex][0].transcript.trim();
            let cleanText = transcript.replace(/[^\u4e00-\u9fa5a-zA-Z0-9]/g, "");
            ignoreWords.forEach(word => { cleanText = cleanText.replace(word, ""); });

            for (const key in soundAlikeDictionary) {
                if (cleanText.includes(key)) {
                    cleanText = cleanText.replace(key, soundAlikeDictionary[key]);
                }
            }

            if (!cleanText || cleanText.length < 2 || cleanText === lastScannedText) return;
            
            heardTextHtml.innerText = cleanText;
            if (pipWin) { pipWin.document.getElementById('h-text').innerText = cleanText; }

            let matchedItems = BARCODE_DATABASE.filter(item => {
                let matchName = cleanText.includes(item.name) || item.name.includes(cleanText);
                let matchAlias = item.aliasList && item.aliasList.some(alias => alias === cleanText);
                return matchName || matchAlias;
            });
            
            if (matchedItems.length === 0) return; 

            lastScannedText = cleanText;

            if (pipWin) {
                const pName = pipWin.document.getElementById('p-name');
                const sMenu = pipWin.document.getElementById('s-menu');
                const bcCanvas = pipWin.document.getElementById('bc-canvas');
                
                sMenu.innerHTML = "";
                sMenu.style.display = "none";
                bcCanvas.style.display = "none";

                if (matchedItems.length === 1) {
                    showBarcode(matchedItems[0]);
                } else {
                    pName.innerText = "請選擇規格";
                    sMenu.style.display = "grid"; 
                    matchedItems.forEach(item => {
                        const btn = pipWin.document.createElement('button');
                        btn.className = 's-btn';
                        btn.innerText = item.name; 
                        btn.onclick = () => {
                            showBarcode(item);
                            sMenu.style.display = "none";
                        };
                        sMenu.appendChild(btn);
                    });
                }
            }
        };

        function showBarcode(item) {
            if (isScanCoolingDown || !item.barcode) return;

            prodNameHtml.innerText = item.name;
            barcodeCanvas.style.display = "block";
            try { JsBarcode(barcodeCanvas, item.barcode, { format: "CODE128", width: 3, height: 95, displayValue: true, fontSize: 22 }); } catch (e) {}

            if (pipWin) {
                const pName = pipWin.document.getElementById('p-name');
                const bcCanvas = pipWin.document.getElementById('bc-canvas');
                pName.innerText = item.name;
                bcCanvas.style.display = "block";
                try {
                    window.JsBarcode(bcCanvas, item.barcode, {
                        format: "CODE128",
                        width: 2.5,       
                        height: 60,     
                        displayValue: true,
                        fontSize: 16,
                        margin: 2
                    });
                } catch (error) {
                    bcCanvas.style.display = "none";
                }

                isScanCoolingDown = true;

                let encodedCode = encodeURIComponent(item.barcode);
                fetch(`http://127.0.0.1:5000/scan?code=${encodedCode}`).then(() => {
                    pName.innerText = item.name + " 🚀已灌入";
                }).catch(() => {}).finally(() => {
                    setTimeout(() => { isScanCoolingDown = false; }, 1500);
                });
            }
        }

        fetchCloudData();
    </script>
</body>
</html>
