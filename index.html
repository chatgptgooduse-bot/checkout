<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>極速結帳助理-智慧懸浮置頂版</title>
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0; padding: 20px;
            display: flex; flex-direction: column; align-items: center; justify-content: flex-start;
            min-height: 92vh; background-color: #f5f5f7; color: #333;
        }
        h1 { font-size: 1.2rem; color: #007aff; margin: 0 0 5px 0; }
        #status { color: #666; margin-bottom: 10px; font-size: 0.9rem; font-weight: bold;}
        
        #pip-btn {
            background-color: #34c759; color: white; border: none; border-radius: 10px;
            padding: 15px 20px; font-size: 1.2rem; font-weight: bold; cursor: pointer;
            box-shadow: 0 4px 10px rgba(52, 199, 89, 0.3); margin-bottom: 15px; width: 100%; max-width: 360px;
        }

        #main-ui {
            width: 100%; max-width: 360px; text-align: center;
            display: flex; flex-direction: column; align-items: center; padding: 20px 0;
            background-color: #ffffff; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }
        #prod-name { font-size: 2.5rem; font-weight: 800; color: #000; margin-bottom: 15px; }
        #spec-menu { display: flex; flex-direction: column; gap: 10px; width: 90%; margin-bottom: 15px; }
        .spec-btn { background-color: #ff9500; color: white; border: none; border-radius: 12px; padding: 14px 10px; font-size: 1.6rem; font-weight: bold; cursor: pointer; }
        .spec-btn:active { background-color: #e08400; }
        
        #barcode-container { width: 100%; min-height: 140px; }
        #barcode-canvas { max-width: 95%; height: auto; margin: 0 auto; }
        
        button#mic-btn { background-color: #007aff; color: white; border: none; border-radius: 50%; width: 80px; height: 80px; font-size: 35px; cursor: pointer; margin-top: 15px; }
        button#mic-btn.active-listening { background-color: #ff3b30; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(255, 59, 48, 0.7); } 70% { box-shadow: 0 0 0 15px rgba(255, 59, 48, 0); } 100% { box-shadow: 0 0 0 0 rgba(255, 59, 48, 0); } }
        #heard-box { font-size: 1.1rem; color: #ff9500; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>

    <h1>🛒 語音結帳助手</h1>
    <div id="status">正在同步雲端品項...</div>

    <button id="pip-btn" onclick="enterPiP()">📌 點我開啟「永遠置頂」懸浮視窗</button>

    <div id="main-ui">
        <div id="prod-name">語音快查</div>
        <div id="spec-menu"></div>
        <div id="barcode-container">
            <canvas id="barcode-canvas"></canvas>
        </div>
        <button id="mic-btn" onclick="toggleListening()">🎤</button>
        <div id="heard-box">正在聽：<span id="heard-text">-</span></div>
    </div>

    <script>
        let BARCODE_DATABASE = [];
        let sheetId = "1rV1jwD3sy5Aib1f2ZnSdSkkrcoEIvJ8DMhzcZbEyaKc"; 
        let lastScannedText = ""; 
        const ignoreWords = ["我要找", "幫我找", "我要查", "幫我查", "那個", "商品是", "有沒有", "一下", "我要", "幫我", "找", "查"];

        let pipWin = null;

        const statusDiv = document.getElementById('status');
        const prodNameHtml = document.getElementById('prod-name');
        const specMenuHtml = document.getElementById('spec-menu');
        const barcodeCanvas = document.getElementById('barcode-canvas');
        const heardTextHtml = document.getElementById('heard-text');
        const micBtn = document.getElementById('mic-btn');

        function fetchCloudData() {
            statusDiv.innerText = "正在更新本地資料庫...";
            const url = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:json&sheet=Sheet1`;
            
            fetch(url)
                .then(res => res.text())
                .then(txt => {
                    const jsonString = txt.substring(txt.indexOf("{"), txt.lastIndexOf("}") + 1);
                    const data = JSON.parse(jsonString);
                    const rows = data.table.rows;
                    
                    BARCODE_DATABASE = rows.map(row => {
                        return {
                            name: row.c[0] ? row.c[0].v.toString().trim() : "",
                            barcode: row.c[1] ? row.c[1].v.toString().trim() : ""
                        };
                    }).filter(item => item.name !== "");
                    
                    statusDiv.innerText = `本地同步成功！共載入 ${BARCODE_DATABASE.length} 個品項`;
                    prodNameHtml.innerText = "請點擊綠色置頂按鈕";
                })
                .catch(err => {
                    statusDiv.innerText = "連線失敗，請檢查網路或發佈設定";
                });
        }

        async function enterPiP() {
            if (!('documentPictureInPicture' in window)) {
                alert("瀏覽器版本不支援懸浮功能！");
                return;
            }

            pipWin = await window.documentPictureInPicture.requestWindow({ width: 320, height: 480 });

            pipWin.document.head.innerHTML = `
                <style>
                    body { font-family: sans-serif; margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; background: #ffffff; height: 90vh; overflow:hidden;}
                    #p-name { font-size: 2.2rem; font-weight: 900; color: #000; text-align: center; margin-top: 10px; margin-bottom: 15px; min-height: 50px; line-height: 1.2;}
                    #s-menu { display: flex; flex-direction: column; gap: 8px; width: 100%; max-height: 150px; overflow-y: auto; margin-bottom: 10px;}
                    .s-btn { background: #ff9500; color: white; border: none; border-radius: 10px; padding: 12px; font-size: 1.4rem; font-weight: bold; cursor: pointer; width: 100%; }
                    .s-btn:active { background: #e08400; }
                    #bc-canvas { max-width: 100%; height: auto; display: none; margin: 0 auto; }
                    #h-box { font-size: 1rem; color: #ff9500; font-weight: bold; margin-top: auto; text-align: center; border-top: 1px solid #eee; width: 100%; padding-top: 8px;}
                </style>
            `;

            pipWin.document.body.innerHTML = `
                <div id="p-name">請開始說話...</div>
                <div id="s-menu"></div>
                <canvas id="bc-canvas"></canvas>
                <div id="h-box">聽：<span id="h-text">-</span></div>
            `;

            statusDiv.innerText = "📌 永遠置頂懸浮窗已啟動！";
            if(!isAutoListening) { startAutoListening(); }
        }

        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        const recognition = new SpeechRecognition();
        recognition.lang = 'zh-TW';
        recognition.continuous = true; 
        recognition.interimResults = true; 

        let isAutoListening = false;
        function toggleListening() { if (isAutoListening) stopAutoListening(); else startAutoListening(); }
        function startAutoListening() { isAutoListening = true; micBtn.classList.add("active-listening"); try { recognition.start(); } catch (e) {} }
        function stopAutoListening() { isAutoListening = false; micBtn.classList.remove("active-listening"); recognition.stop(); }
        recognition.onend = () => { if (isAutoListening) { try { recognition.start(); } catch (e) {} } };

        recognition.onresult = (event) => {
            let currentResultIndex = event.resultIndex;
            let transcript = event.results[currentResultIndex][0].transcript.trim();
            let cleanText = transcript.replace(/[^\u4e00-\u9fa5a-zA-Z0-9]/g, "");
            ignoreWords.forEach(word => { cleanText = cleanText.replace(word, ""); });

            if (!cleanText || cleanText === lastScannedText) return;
            
            heardTextHtml.innerText = cleanText;
            if (pipWin) { pipWin.document.getElementById('h-text').innerText = cleanText; }

            let matchedItems = BARCODE_DATABASE.filter(item => cleanText.includes(item.name) || item.name.includes(cleanText));
            if (matchedItems.length === 0) return; 

            lastScannedText = cleanText;

            if (pipWin) {
                const pName = pipWin.document.getElementById('p-name');
                const sMenu = pipWin.document.getElementById('s-menu');
                const bcCanvas = pipWin.document.getElementById('bc-canvas');
                
                sMenu.innerHTML = "";
                sMenu.style.display = "none";
                bcCanvas.style.display = "none";

                if (matchedItems.length === 1) {
                    showBarcode(matchedItems[0]);
                } else {
                    pName.innerText = "請選擇規格";
                    sMenu.style.display = "flex";
                    matchedItems.forEach(item => {
                        const btn = pipWin.document.createElement('button');
                        btn.className = 's-btn';
                        btn.innerText = item.name; 
                        btn.onclick = () => {
                            showBarcode(item);
                            sMenu.style.display = "none";
                        };
                        sMenu.appendChild(btn);
                    });
                }
            }
        };

        function showBarcode(item) {
            prodNameHtml.innerText = item.name;
            barcodeCanvas.style.display = "block";
            try { JsBarcode(barcodeCanvas, item.barcode, { format: "CODE128", width: 3, height: 95, displayValue: true, fontSize: 22 }); } catch (e) {}

            if (pipWin) {
                const pName = pipWin.document.getElementById('p-name');
                const bcCanvas = pipWin.document.getElementById('bc-canvas');
                pName.innerText = item.name;
                bcCanvas.style.display = "block";
                try {
                    window.JsBarcode(bcCanvas, item.barcode, {
                        format: "CODE128",
                        width: 2.2,
                        height: 80,
                        displayValue: true,
                        fontSize: 16,
                        margin: 10
                    });
                } catch (error) {
                    bcCanvas.style.display = "none";
                }
            }
        }

        fetchCloudData();
    </script>
</body>
</html>
